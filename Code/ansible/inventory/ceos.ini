[ceos_switches]
arista-ceos-01 ansible_host=arista-ceos-01

[ceos_switches:vars]
# Credentials come from Docker/.env → injected into container as env vars
# For cEOS the default is admin/admin (set in startup-config)
ansible_user={{ lookup('env', 'CEOS_SSH_USER') | default('admin') }}
ansible_password={{ lookup('env', 'CEOS_SSH_PASSWORD') | default('admin') }}
ansible_network_os=eos
ansible_connection=network_cli
ansible_become=yes
ansible_become_method=enable
ansible_host_key_checking=False
