# Physical network devices (real hardware)
# Credentials are NOT stored here — they come from Docker/.env
# and are injected as environment variables into the automation container.
#
# ansible_user     → env: DEVICE_SSH_USER
# ansible_password → env: DEVICE_SSH_PASSWORD
# ansible_become_password → env: DEVICE_SSH_ENABLE (enable/privilege password)

[arista_physical]
osl3-test-leaf-a01-1 ansible_host=10.122.195.86
# arista-core-02 ansible_host=10.0.1.2

[cisco_physical]
# cisco-router-01 ansible_host=10.0.2.1

[fortinet_physical]
# fg-firewall-01 ansible_host=10.0.3.1

# -------------------------------------------------------------------------
# Group vars — shared settings for each vendor
# -------------------------------------------------------------------------

[arista_physical:vars]
ansible_user={{ lookup('env', 'DEVICE_SSH_USER') }}
ansible_password={{ lookup('env', 'DEVICE_SSH_PASSWORD') }}
ansible_become_password={{ lookup('env', 'DEVICE_SSH_ENABLE') }}
ansible_network_os=eos
ansible_connection=network_cli
ansible_become=yes
ansible_become_method=enable

[cisco_physical:vars]
ansible_user={{ lookup('env', 'DEVICE_SSH_USER') }}
ansible_password={{ lookup('env', 'DEVICE_SSH_PASSWORD') }}
ansible_become_password={{ lookup('env', 'DEVICE_SSH_ENABLE') }}
ansible_network_os=ios
ansible_connection=network_cli
ansible_become=yes
ansible_become_method=enable

[fortinet_physical:vars]
ansible_user={{ lookup('env', 'DEVICE_SSH_USER') }}
ansible_password={{ lookup('env', 'DEVICE_SSH_PASSWORD') }}
ansible_network_os=fortios
ansible_connection=httpapi
ansible_httpapi_use_ssl=yes
ansible_httpapi_validate_certs=no
