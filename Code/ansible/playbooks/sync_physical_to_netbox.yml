        body:
          status: "active"
          comments: "IOS version: {{ device_version }} | Model: {{ device_model }} | Last synced: {{ run_ts }}"
        validate_certs: false
        status_code: 200
      delegate_to: localhost

    - name: Log version update
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ run_ts }} | {{ vendor }} | {{ inventory_hostname }} | VERSION_UPDATED | IOS={{ device_version }} Model={{ device_model }}"
        create: true
