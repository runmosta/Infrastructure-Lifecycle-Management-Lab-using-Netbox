      register: nb_device_query
      delegate_to: localhost

    - name: Extract Netbox device object
      set_fact:
        nb_device: "{{ nb_device_query.json.results[0] | default(none) }}"

    - name: Fail when device not in Netbox
      fail:
        msg: "No DCIM device '{{ inventory_hostname }}' in Netbox. Run Add_Device.py first."
      when: nb_device is none

    - name: Set device status to offline
      uri:
