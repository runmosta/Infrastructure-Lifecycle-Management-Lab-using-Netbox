    - name: Determine Netbox serial
      set_fact:
        nb_serial: "{{ nb_device.get('serial', '') | default('') | trim }}"

    - name: Write serial to Netbox (was blank)
      uri:
        url: "{{ netbox_url }}/api/dcim/devices/{{ nb_device.id }}/"
        method: PATCH
        headers: "{{ netbox_headers_json }}"
        body_format: json
        body:
          serial: "{{ device_serial }}"
        validate_certs: false
        status_code: 200
      delegate_to: localhost
      when:
        - nb_serial == ""
        - device_serial != ""

    - name: Log serial written
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ run_ts }} | {{ vendor }} | {{ inventory_hostname }} | SERIAL_WRITTEN | serial={{ device_serial }}"
        create: true
      delegate_to: localhost
      when:
        - nb_serial == ""
        - device_serial != ""

    - name: Log serial match
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ run_ts }} | {{ vendor }} | {{ inventory_hostname }} | SERIAL_OK | serial={{ device_serial }}"
        create: true
      delegate_to: localhost
      when:
        - nb_serial != ""
        - nb_serial == device_serial

    - name: Log serial mismatch
      lineinfile:
        path: "{{ log_file }}"
        line: >-
          {{ run_ts }} | {{ vendor }} | {{ inventory_hostname }} | SERIAL_MISMATCH |
          netbox={{ nb_serial }} device={{ device_serial }} | ACTION REQUIRED
        create: true
      delegate_to: localhost
      when:
