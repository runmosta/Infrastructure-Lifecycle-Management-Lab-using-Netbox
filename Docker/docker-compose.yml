services:
  # PostgreSQL Database - Backend for Netbox
  postgres:
    image: postgres:15-alpine
    container_name: netbox-postgres
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox_password_change_me
    volumes:
      # Persist database to Windows filesystem
      - ./Data/postgres:/var/lib/postgresql/data
    networks:
      - netbox-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # Redis Cache - Optional but recommended for Netbox performance
  redis:
    image: redis:7-alpine
    container_name: netbox-redis
    volumes:
      - ./Data/volumes/redis:/data
    networks:
      - netbox-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Netbox - Network Source of Truth
  netbox:
    build:
      context: ..           # project root so Dockerfile can COPY Code/...
      dockerfile: Docker/Dockerfile.netbox
    image: netbox-lab:latest  # tag the built image for re-use by netbox-worker
    container_name: netbox-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database Connection
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox_password_change_me
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis Cache
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_CACHE: 0
      REDIS_DB_TASK: 1
      
      # Netbox Settings
      SECRET_KEY: ${NETBOX_SECRET_KEY}
      API_TOKEN_PEPPER_1: ${API_TOKEN_PEPPER_1}
      ALLOWED_HOSTS: "localhost 127.0.0.1 netbox"
      SUPERUSER_USERNAME: admin
      SUPERUSER_PASSWORD: ${NETBOX_ADMIN_PASSWORD}
      SUPERUSER_API_TOKEN: ${NETBOX_API_TOKEN}
      SUPERUSER_EMAIL: admin@netbox.local
      TIME_ZONE: UTC
      BASE_PATH: ""
      METRICS_ENABLED: "true"
    volumes:
      # Persist media and configs
      - ./Data/netbox:/opt/netbox/netbox/media
      - ./logs/netbox:/var/log/netbox
      # Load plugins.py into Netbox config directory (scanned at startup)
      - ../Code/netbox/plugins/plugins.py:/etc/netbox/config/plugins.py
    networks:
      - netbox-network
    ports:
      - "8000:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Netbox Worker - Background tasks
  netbox-worker:
    image: netbox-lab:latest  # reuses the image built by the netbox service above
    container_name: netbox-worker
    depends_on:
      - postgres
      - redis
    environment:
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox_password_change_me
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB_CACHE: 0
      REDIS_DB_TASK: 1
      SECRET_KEY: ${NETBOX_SECRET_KEY}
      API_TOKEN_PEPPER_1: ${API_TOKEN_PEPPER_1}
    volumes:
      - ./logs/netbox:/var/log/netbox
      - ../Code/netbox/plugins/plugins.py:/etc/netbox/config/plugins.py
    networks:
      - netbox-network
    command: python manage.py rqworker
    restart: unless-stopped

  # Automation Node - Runs Ansible playbooks and Python scripts
  automation:
    image: python:3.11-slim
    container_name: netbox-automation
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
      NETBOX_URL: http://netbox:8080
      NETBOX_API_TOKEN: ${NETBOX_API_TOKEN}
      NETBOX_VERIFY_SSL: "false"
    volumes:
      - ./.env:/workspace/.env
      - ../Code/ansible:/workspace/ansible
      - ../Code/python/scripts:/workspace/python
      - ../Code/python/requirements.txt:/workspace/requirements.txt
      - ../Data/inputs:/workspace/Data/inputs
      - ../logs/python:/workspace/logs
      - ./logs/ansible:/var/log/ansible
    networks:
      - netbox-network
    working_dir: /workspace
    # Install dependencies then keep container running for manual execution
    command: sh -c "pip install -q -r requirements.txt && sleep infinity"
    restart: unless-stopped
    depends_on:
      - netbox
      - postgres
      - redis

  # Arista cEOS-lab virtual switch (cEOS64-lab-4.36.0F)
  arista-ceos-01:
    build:
      context: .
      dockerfile: Dockerfile.ceos
    image: arista/ceos-lab:latest
    container_name: arista-ceos-01
    privileged: true
    # cEOS needs a unique system MAC per instance; adjust if running multiple
    environment:
      CEOS: 1
      EOS_PLATFORM: ceoslab
      CEOS_SYSTEM_MAC: "00:1c:73:ab:cd:01"
      container: docker
      INTFTYPE: eth
      ETBA: 1
      SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT: 1
      MGMT_INTF: eth0
    networks:
      - netbox-network
    volumes:
      - ceos01-flash:/mnt/flash
      - /lib/modules:/lib/modules:ro
    command: /sbin/init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "Cli", "-c", "show version"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  netbox-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  netbox_data:
  ceos01-flash:
